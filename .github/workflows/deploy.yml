name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # O la rama que estés usando para tu código fuente

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false # <--- ESTO MATA EL ERROR DEFINITIVAMENTE

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
